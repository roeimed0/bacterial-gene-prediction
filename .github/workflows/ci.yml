name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install linting tools
        run: pip install flake8 black==25.11.0 isort==6.1.0
      - name: Check formatting (black)
        run: black --check src/ api/ hybrid_predictor.py scripts/
      - name: Check imports (isort)
        run: isort --check-only src/ api/ hybrid_predictor.py scripts/
      - name: Lint (flake8)
        run: flake8 src/ api/ hybrid_predictor.py scripts/

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Run tests
        run: pytest tests/ -v --tb=short -m "not slow" --cov=src --cov=api --cov-report=term-missing
