repos:
  - repo: local
    hooks:
      - id: black
        name: black
        language: system
        entry: black
        args: [--line-length=100]
        types: [python]

      - id: isort
        name: isort
        language: system
        entry: isort
        args: [--profile=black, --line-length=100]
        types: [python]
